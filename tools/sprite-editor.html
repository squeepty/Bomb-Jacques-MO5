<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bomb Jacques Sprite Editor</title>
  <style>
    :root {
      --ink: #111214;
      --panel: #050505;
      --panel-text: #f4f4f2;
      --muted: #6f746f;
      --line: #3c4244;
      --paper: #202326;
      --surface: #272b2e;
      --surface-2: #31363a;
      --cyan: #58d9e6;
      --cyan-soft: #aef2f5;
      --yellow: #f0c947;
      --green: #2f8f5b;
      --danger: #bd3c2f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--panel-text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
      overflow: hidden;
    }

    button {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      height: 100vh;
      overflow: hidden;
    }

    .sprite-list-panel {
      background: var(--panel);
      color: var(--panel-text);
      border-right: 1px solid #242424;
      display: flex;
      flex-direction: column;
      height: 100vh;
      min-height: 0;
      overflow: hidden;
    }

    .panel-head {
      padding: 18px 16px 14px;
      border-bottom: 1px solid #262626;
    }

    .panel-head h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 22px;
      margin-top: 10px;
      color: #b9bbb6;
      font-size: 13px;
      line-height: 1.35;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex: 0 0 auto;
    }

    .status.ok::before {
      background: var(--green);
    }

    .status.busy::before {
      background: var(--yellow);
    }

    .status.error::before {
      background: var(--danger);
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-top: 12px;
      padding: 3px;
      border: 1px solid #2c3032;
      border-radius: 6px;
      background: #151719;
    }

    .mode-tab {
      height: 30px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: var(--panel-text);
      cursor: pointer;
      font-size: 13px;
      font-weight: 650;
    }

    .mode-tab.selected {
      border-color: #151515;
      background: var(--yellow);
      color: var(--ink);
    }

    .sprite-list {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px;
      scrollbar-color: #5b6266 #111111;
    }

    .sprite-item {
      width: 100%;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 7px 8px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: inherit;
      background: transparent;
      text-align: left;
      cursor: pointer;
    }

    .sprite-item:hover {
      background: #181818;
    }

    .sprite-item.selected {
      border-color: var(--yellow);
      background: #211f14;
    }

    .sprite-item.dirty .sprite-name::after {
      content: " *";
      color: var(--yellow);
    }

    .sprite-preview {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      border: 1px solid #343434;
      background: var(--cyan);
    }

    .sprite-preview.sidebar-art-list-preview {
      height: 72px;
    }

    .sprite-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .editor {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      height: 100vh;
      min-height: 0;
      overflow: hidden;
      background: var(--paper);
    }

    .toolbar {
      min-height: 76px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      background: var(--surface);
      color: var(--panel-text);
    }

    .selected-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 750;
    }

    .selected-labels {
      margin-top: 5px;
      color: #aab1ad;
      font-size: 13px;
      line-height: 1.35;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .edit-tools {
      display: flex;
      gap: 4px;
      padding: 3px;
      border: 1px solid #60686b;
      border-radius: 6px;
      background: #1e2225;
    }

    .tool-button {
      min-width: 58px;
      height: 30px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: var(--panel-text);
      cursor: pointer;
      font-weight: 650;
    }

    .tool-button.selected {
      border-color: #151515;
      background: var(--cyan-soft);
      color: var(--ink);
    }

    .tool-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .action-button {
      min-width: 86px;
      height: 38px;
      border: 1px solid #60686b;
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--panel-text);
      cursor: pointer;
      font-weight: 650;
    }

    .action-button.primary {
      border-color: #151515;
      background: var(--yellow);
      color: var(--ink);
    }

    .action-button:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .workbench {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      overflow: hidden;
    }

    .edit-stage {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: 104px minmax(0, auto);
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .real-preview-shell {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border: 2px solid var(--ink);
      background: var(--cyan-soft);
      justify-self: center;
    }

    .real-preview {
      width: 32px;
      height: 32px;
      image-rendering: pixelated;
      background: transparent;
    }

    .real-preview-shell.sidebar-art-preview-shell {
      width: 96px;
      height: 216px;
    }

    .real-preview.sidebar-art-preview {
      width: 56px;
      height: 128px;
    }

    .pixel-grid {
      width: min(calc(100vh - 128px), calc(100vw - 488px), 680px);
      min-width: min(320px, calc(100vw - 456px));
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(16, minmax(0, 1fr));
      grid-template-rows: repeat(16, minmax(0, 1fr));
      border: 2px solid var(--ink);
      background: var(--ink);
      touch-action: none;
      user-select: none;
    }

    .pixel-grid.sidebar-art-grid {
      width: min(calc((100vh - 128px) * 0.4375), calc(100vw - 488px), 340px);
      min-width: min(224px, calc(100vw - 456px));
      aspect-ratio: 7 / 16;
      grid-template-columns: repeat(56, minmax(0, 1fr));
      grid-template-rows: repeat(128, minmax(0, 1fr));
    }

    .pixel {
      min-width: 0;
      min-height: 0;
      border: 0;
      border-right: 1px solid rgba(17, 18, 20, 0.28);
      border-bottom: 1px solid rgba(17, 18, 20, 0.28);
      background: var(--cyan-soft);
      cursor: crosshair;
      padding: 0;
    }

    .pixel.on {
      background: var(--ink);
    }

    .pixel.split-x {
      border-left: 3px solid var(--ink);
    }

    .pixel.split-y {
      border-top: 3px solid var(--ink);
    }

    .pixel:hover {
      outline: 2px solid var(--yellow);
      outline-offset: -2px;
    }

    .pixel-grid[data-tool="erase"] .pixel {
      cursor: cell;
    }

    .empty-state {
      color: var(--muted);
      font-size: 16px;
    }

    @media (max-width: 760px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100vh;
      }

      .sprite-list-panel {
        height: 168px;
        min-height: 0;
        border-right: 0;
        border-bottom: 1px solid #242424;
      }

      .sprite-list {
        display: flex;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .sprite-item {
        min-width: 190px;
      }

      .toolbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .edit-stage {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .real-preview-shell {
        width: 64px;
        height: 64px;
      }

      .real-preview-shell.sidebar-art-preview-shell {
        width: 84px;
        height: 192px;
      }

      .pixel-grid {
        width: min(calc(100vh - 420px), 92vw, 560px);
        min-width: 0;
      }

      .pixel-grid.sidebar-art-grid {
        width: min(calc((100vh - 420px) * 0.4375), 76vw, 300px);
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sprite-list-panel">
      <div class="panel-head">
        <h1>Sprite Editor</h1>
        <div id="status" class="status busy">Loading</div>
        <div class="mode-tabs" role="tablist" aria-label="Editor mode">
          <button id="spritesTab" class="mode-tab selected" type="button" role="tab" aria-selected="true">Sprites</button>
          <button id="sidebarArtTab" class="mode-tab" type="button" role="tab" aria-selected="false">Right Panel</button>
        </div>
      </div>
      <div id="spriteList" class="sprite-list" role="listbox" aria-label="Sprites"></div>
    </aside>

    <main class="editor">
      <header class="toolbar">
        <div>
          <h2 id="selectedTitle" class="selected-title">No Sprite</h2>
          <div id="selectedLabels" class="selected-labels"></div>
        </div>
        <div class="actions">
          <div class="edit-tools" role="group" aria-label="Pixel tool">
            <button id="drawToolButton" class="tool-button selected" type="button" aria-pressed="true" title="Draw pixels">Draw</button>
            <button id="eraseToolButton" class="tool-button" type="button" aria-pressed="false" title="Erase pixels">Erase</button>
          </div>
          <button id="undoButton" class="action-button" type="button" disabled>Undo</button>
          <button id="saveButton" class="action-button primary" type="button" disabled>Save</button>
        </div>
      </header>

      <section class="workbench">
        <div class="edit-stage">
          <div class="real-preview-shell" aria-hidden="true">
            <canvas id="realPreview" class="real-preview"></canvas>
          </div>
          <div id="pixelGrid" class="pixel-grid" aria-label="2 by 2 sprite pixel grid"></div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const spriteList = document.getElementById("spriteList");
    const pixelGrid = document.getElementById("pixelGrid");
    const realPreview = document.getElementById("realPreview");
    const realPreviewShell = document.querySelector(".real-preview-shell");
    const selectedTitle = document.getElementById("selectedTitle");
    const selectedLabels = document.getElementById("selectedLabels");
    const spritesTab = document.getElementById("spritesTab");
    const sidebarArtTab = document.getElementById("sidebarArtTab");
    const drawToolButton = document.getElementById("drawToolButton");
    const eraseToolButton = document.getElementById("eraseToolButton");
    const undoButton = document.getElementById("undoButton");
    const saveButton = document.getElementById("saveButton");
    const statusEl = document.getElementById("status");

    const MODE_SPRITES = "sprites";
    const MODE_SIDEBAR_ART = "sidebar-art";

    const state = {
      mode: MODE_SPRITES,
      sprites: [],
      sidebarArt: null,
      selectedId: null,
      pixels: Array(256).fill(false),
      savedRows: [],
      dirty: false,
      saving: false,
      tool: "draw",
      painting: false,
      paintValue: true,
    };

    function setStatus(text, tone = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (tone ? " " + tone : "");
    }

    function selectedSprite() {
      return state.sprites.find((sprite) => sprite.id === state.selectedId) || null;
    }

    function hasEditableSelection() {
      return state.mode === MODE_SPRITES ? Boolean(selectedSprite()) : Boolean(state.sidebarArt);
    }

    function currentWidth() {
      return state.mode === MODE_SIDEBAR_ART ? state.sidebarArt?.width ?? 56 : 16;
    }

    function currentHeight() {
      return state.mode === MODE_SIDEBAR_ART ? state.sidebarArt?.height ?? 128 : 16;
    }

    function rowsToPixels(rows) {
      const pixels = Array(256).fill(false);
      for (let y = 0; y < 16; y += 1) {
        for (let x = 0; x < 16; x += 1) {
          const cell = (y >= 8 ? 2 : 0) + (x >= 8 ? 1 : 0);
          const row = rows[cell * 8 + (y % 8)];
          pixels[y * 16 + x] = Boolean(row & (1 << (7 - (x % 8))));
        }
      }
      return pixels;
    }

    function pixelsToRows(pixels) {
      const rows = Array(32).fill(0);
      for (let y = 0; y < 16; y += 1) {
        for (let x = 0; x < 16; x += 1) {
          if (!pixels[y * 16 + x]) {
            continue;
          }
          const cell = (y >= 8 ? 2 : 0) + (x >= 8 ? 1 : 0);
          const index = cell * 8 + (y % 8);
          rows[index] |= 1 << (7 - (x % 8));
        }
      }
      return rows;
    }

    function sidebarRowsToPixels(rows, art) {
      const pixels = Array(art.width * art.height).fill(false);
      for (let y = 0; y < art.height; y += 1) {
        for (let x = 0; x < art.width; x += 1) {
          const row = rows[y * art.bytesPerRow + Math.floor(x / 8)];
          pixels[y * art.width + x] = Boolean(row & (1 << (7 - (x % 8))));
        }
      }
      return pixels;
    }

    function sidebarPixelsToRows(pixels, art) {
      const rows = Array(art.height * art.bytesPerRow).fill(0);
      for (let y = 0; y < art.height; y += 1) {
        for (let x = 0; x < art.width; x += 1) {
          if (!pixels[y * art.width + x]) {
            continue;
          }
          const index = y * art.bytesPerRow + Math.floor(x / 8);
          rows[index] |= 1 << (7 - (x % 8));
        }
      }
      return rows;
    }

    function currentRowsFromPixels() {
      return state.mode === MODE_SIDEBAR_ART ? sidebarPixelsToRows(state.pixels, state.sidebarArt) : pixelsToRows(state.pixels);
    }

    function currentPixelsFromRows(rows) {
      return state.mode === MODE_SIDEBAR_ART ? sidebarRowsToPixels(rows, state.sidebarArt) : rowsToPixels(rows);
    }

    function rowsEqual(left, right) {
      return left.length === right.length && left.every((value, index) => value === right[index]);
    }

    function drawPreview(canvas, rows) {
      const context = canvas.getContext("2d");
      const pixels = rowsToPixels(rows);
      canvas.width = 32;
      canvas.height = 32;
      context.imageSmoothingEnabled = false;
      context.fillStyle = "#aef2f5";
      context.fillRect(0, 0, 32, 32);
      context.fillStyle = "#111214";
      for (let y = 0; y < 16; y += 1) {
        for (let x = 0; x < 16; x += 1) {
          if (pixels[y * 16 + x]) {
            context.fillRect(x * 2, y * 2, 2, 2);
          }
        }
      }
    }

    function drawSidebarArtPreview(canvas, art, rows) {
      const context = canvas.getContext("2d");
      const pixels = sidebarRowsToPixels(rows, art);
      canvas.width = art.width;
      canvas.height = art.height;
      context.imageSmoothingEnabled = false;
      context.fillStyle = "#aef2f5";
      context.fillRect(0, 0, art.width, art.height);
      context.fillStyle = "#111214";
      for (let y = 0; y < art.height; y += 1) {
        for (let x = 0; x < art.width; x += 1) {
          if (pixels[y * art.width + x]) {
            context.fillRect(x, y, 1, 1);
          }
        }
      }
    }

    function drawRealPreview() {
      const context = realPreview.getContext("2d");
      const width = currentWidth();
      const height = currentHeight();
      realPreview.width = width;
      realPreview.height = height;
      realPreview.classList.toggle("sidebar-art-preview", state.mode === MODE_SIDEBAR_ART);
      realPreviewShell.classList.toggle("sidebar-art-preview-shell", state.mode === MODE_SIDEBAR_ART);
      context.imageSmoothingEnabled = false;
      context.fillStyle = "#aef2f5";
      context.fillRect(0, 0, width, height);
      context.fillStyle = "#111214";
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (state.pixels[y * width + x]) {
            context.fillRect(x, y, 1, 1);
          }
        }
      }
    }

    function renderModeTabs() {
      const spritesSelected = state.mode === MODE_SPRITES;
      spritesTab.classList.toggle("selected", spritesSelected);
      sidebarArtTab.classList.toggle("selected", !spritesSelected);
      spritesTab.setAttribute("aria-selected", spritesSelected ? "true" : "false");
      sidebarArtTab.setAttribute("aria-selected", spritesSelected ? "false" : "true");
    }

    function renderList() {
      spriteList.replaceChildren();
      spriteList.setAttribute("aria-label", state.mode === MODE_SPRITES ? "Sprites" : "Right panel art");

      if (state.mode === MODE_SIDEBAR_ART) {
        if (!state.sidebarArt) {
          spriteList.innerHTML = "<div class=\"empty-state\">No art loaded</div>";
          return;
        }

        const button = document.createElement("button");
        button.type = "button";
        button.className = "sprite-item selected";
        button.dataset.id = state.sidebarArt.id;
        button.setAttribute("role", "option");
        button.setAttribute("aria-selected", "true");
        button.classList.toggle("dirty", state.dirty);

        const canvas = document.createElement("canvas");
        canvas.className = "sprite-preview sidebar-art-list-preview";
        canvas.setAttribute("aria-hidden", "true");
        drawSidebarArtPreview(canvas, state.sidebarArt, state.dirty ? currentRowsFromPixels() : state.sidebarArt.rows);

        const name = document.createElement("span");
        name.className = "sprite-name";
        name.textContent = state.sidebarArt.name;

        button.append(canvas, name);
        spriteList.append(button);
        return;
      }

      state.sprites.forEach((sprite) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "sprite-item";
        button.dataset.id = sprite.id;
        button.setAttribute("role", "option");
        button.setAttribute("aria-selected", sprite.id === state.selectedId ? "true" : "false");
        if (sprite.id === state.selectedId) {
          button.classList.add("selected");
        }
        if (sprite.id === state.selectedId && state.dirty) {
          button.classList.add("dirty");
        }

        const canvas = document.createElement("canvas");
        canvas.className = "sprite-preview";
        canvas.setAttribute("aria-hidden", "true");
        drawPreview(canvas, sprite.id === state.selectedId ? pixelsToRows(state.pixels) : sprite.rows);

        const name = document.createElement("span");
        name.className = "sprite-name";
        name.textContent = sprite.name;

        button.append(canvas, name);
        spriteList.append(button);
      });
    }

    function updateToolButtons() {
      const hasSelection = hasEditableSelection();
      pixelGrid.dataset.tool = state.tool;
      drawToolButton.classList.toggle("selected", state.tool === "draw");
      eraseToolButton.classList.toggle("selected", state.tool === "erase");
      drawToolButton.setAttribute("aria-pressed", state.tool === "draw" ? "true" : "false");
      eraseToolButton.setAttribute("aria-pressed", state.tool === "erase" ? "true" : "false");
      drawToolButton.disabled = !hasSelection || state.saving;
      eraseToolButton.disabled = !hasSelection || state.saving;
    }

    function renderGrid() {
      const width = currentWidth();
      const height = currentHeight();
      pixelGrid.replaceChildren();
      pixelGrid.classList.toggle("sidebar-art-grid", state.mode === MODE_SIDEBAR_ART);
      pixelGrid.style.gridTemplateColumns = `repeat(${width}, minmax(0, 1fr))`;
      pixelGrid.style.gridTemplateRows = `repeat(${height}, minmax(0, 1fr))`;
      pixelGrid.setAttribute("aria-label", state.mode === MODE_SIDEBAR_ART ? "Right panel art pixel grid" : "2 by 2 sprite pixel grid");
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const index = y * width + x;
          const pixel = document.createElement("button");
          pixel.type = "button";
          pixel.className = "pixel";
          pixel.dataset.index = String(index);
          pixel.setAttribute("aria-label", "Pixel " + (x + 1) + ", " + (y + 1));
          if (state.pixels[index]) {
            pixel.classList.add("on");
          }
          if (x > 0 && x % 8 === 0) {
            pixel.classList.add("split-x");
          }
          if (y > 0 && y % 8 === 0) {
            pixel.classList.add("split-y");
          }
          pixelGrid.append(pixel);
        }
      }
    }

    function selectedListButton() {
      if (state.mode === MODE_SIDEBAR_ART) {
        return spriteList.querySelector("[data-id=\"sidebar-art\"]");
      }

      if (!state.selectedId) {
        return null;
      }

      return [...spriteList.querySelectorAll(".sprite-item")].find((item) => item.dataset.id === state.selectedId) || null;
    }

    function refreshSelectedListPreview() {
      const button = selectedListButton();
      if (!button) {
        return;
      }

      button.classList.toggle("dirty", state.dirty);
      const canvas = button.querySelector(".sprite-preview");
      if (canvas && state.mode === MODE_SIDEBAR_ART) {
        drawSidebarArtPreview(canvas, state.sidebarArt, currentRowsFromPixels());
      } else if (canvas) {
        drawPreview(canvas, pixelsToRows(state.pixels));
      }
    }

    function refreshEditState() {
      state.dirty = !rowsEqual(currentRowsFromPixels(), state.savedRows);
      undoButton.disabled = !state.dirty || state.saving;
      saveButton.disabled = !state.dirty || state.saving;
      updateToolButtons();
      drawRealPreview();
      refreshSelectedListPreview();
    }

    function setPixel(index, value) {
      if (index < 0 || index >= state.pixels.length || state.pixels[index] === value) {
        return;
      }

      state.pixels[index] = value;
      const pixel = pixelGrid.querySelector("[data-index=\"" + index + "\"]");
      if (pixel) {
        pixel.classList.toggle("on", value);
      }
      refreshEditState();
    }

    function pixelIndexFromPointer(event) {
      const rect = pixelGrid.getBoundingClientRect();
      const width = currentWidth();
      const height = currentHeight();
      const x = Math.floor(((event.clientX - rect.left) / rect.width) * width);
      const y = Math.floor(((event.clientY - rect.top) / rect.height) * height);
      if (x < 0 || x >= width || y < 0 || y >= height) {
        return null;
      }
      return y * width + x;
    }

    function paintFromPointer(event) {
      const index = pixelIndexFromPointer(event);
      if (index !== null) {
        setPixel(index, state.paintValue);
      }
    }

    function renderSelection() {
      if (state.mode === MODE_SIDEBAR_ART) {
        if (!state.sidebarArt) {
          selectedTitle.textContent = "No Art";
          selectedLabels.textContent = "";
          undoButton.disabled = true;
          saveButton.disabled = true;
          state.pixels = [];
          drawRealPreview();
          pixelGrid.innerHTML = "<div class=\"empty-state\">No art loaded</div>";
          updateToolButtons();
          return;
        }

        selectedTitle.textContent = state.sidebarArt.name;
        selectedLabels.textContent = state.sidebarArt.label + " / " + state.sidebarArt.width + "x" + state.sidebarArt.height;
        undoButton.disabled = !state.dirty || state.saving;
        saveButton.disabled = !state.dirty || state.saving;
        updateToolButtons();
        drawRealPreview();
        renderGrid();
        return;
      }

      const sprite = selectedSprite();
      if (!sprite) {
        selectedTitle.textContent = "No Sprite";
        selectedLabels.textContent = "";
        undoButton.disabled = true;
        saveButton.disabled = true;
        state.pixels = Array(256).fill(false);
        drawRealPreview();
        pixelGrid.innerHTML = "<div class=\"empty-state\">No sprite selected</div>";
        updateToolButtons();
        return;
      }

      selectedTitle.textContent = sprite.name;
      selectedLabels.textContent = sprite.labels.join(" / ");
      undoButton.disabled = !state.dirty || state.saving;
      saveButton.disabled = !state.dirty || state.saving;
      updateToolButtons();
      drawRealPreview();
      renderGrid();
    }

    function render() {
      renderModeTabs();
      renderList();
      renderSelection();
    }

    function setDirtyFromPixels() {
      refreshEditState();
    }

    function confirmDiscardDirty() {
      return !state.dirty || window.confirm("Discard unsaved pixel edits?");
    }

    function selectSprite(id) {
      if (state.mode === MODE_SPRITES && !confirmDiscardDirty()) {
        return;
      }

      const sprite = state.sprites.find((item) => item.id === id);
      if (!sprite) {
        return;
      }

      state.selectedId = sprite.id;
      state.savedRows = sprite.rows.slice();
      state.pixels = rowsToPixels(sprite.rows);
      state.dirty = false;
      render();
    }

    function selectSidebarArt() {
      if (state.mode === MODE_SIDEBAR_ART && !confirmDiscardDirty()) {
        return;
      }

      if (!state.sidebarArt) {
        return;
      }

      state.savedRows = state.sidebarArt.rows.slice();
      state.pixels = sidebarRowsToPixels(state.sidebarArt.rows, state.sidebarArt);
      state.dirty = false;
      render();
    }

    function switchMode(mode) {
      if (mode === state.mode) {
        return;
      }

      if (!confirmDiscardDirty()) {
        return;
      }

      state.mode = mode;
      state.dirty = false;
      state.painting = false;
      if (state.mode === MODE_SPRITES) {
        const sprite = selectedSprite() || state.sprites[0];
        if (sprite) {
          state.selectedId = sprite.id;
          state.savedRows = sprite.rows.slice();
          state.pixels = rowsToPixels(sprite.rows);
        }
      } else if (state.sidebarArt) {
        state.savedRows = state.sidebarArt.rows.slice();
        state.pixels = sidebarRowsToPixels(state.sidebarArt.rows, state.sidebarArt);
      }
      render();
      setStatus("Ready", "ok");
    }

    async function loadEditorData() {
      setStatus("Loading", "busy");
      const [spritesResponse, artResponse] = await Promise.all([
        fetch("/api/sprites"),
        fetch("/api/sidebar-art"),
      ]);
      if (!spritesResponse.ok) {
        throw new Error((await spritesResponse.json()).error || "Unable to load sprites");
      }
      if (!artResponse.ok) {
        throw new Error((await artResponse.json()).error || "Unable to load right panel art");
      }

      const spritePayload = await spritesResponse.json();
      const artPayload = await artResponse.json();
      state.sprites = spritePayload.sprites;
      state.sidebarArt = artPayload.art;
      if (state.sprites.length > 0) {
        selectSprite(state.sprites[0].id);
      } else {
        render();
      }
      setStatus("Ready", "ok");
    }

    async function saveSprite() {
      const sprite = selectedSprite();
      if (!sprite || !state.dirty || state.saving) {
        return;
      }

      state.saving = true;
      renderSelection();
      setStatus("Saving", "busy");

      try {
        const response = await fetch("/api/sprites/" + encodeURIComponent(sprite.id), {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ rows: pixelsToRows(state.pixels) }),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Unable to save sprite");
        }

        sprite.rows = payload.sprite.rows.slice();
        state.savedRows = payload.sprite.rows.slice();
        state.pixels = rowsToPixels(payload.sprite.rows);
        state.dirty = false;
        setStatus(payload.build && payload.build.ok ? "Saved and rebuilt" : "Saved, build failed", payload.build && payload.build.ok ? "ok" : "error");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        state.saving = false;
        render();
      }
    }

    async function saveSidebarArt() {
      if (!state.sidebarArt || !state.dirty || state.saving) {
        return;
      }

      state.saving = true;
      renderSelection();
      setStatus("Saving", "busy");

      try {
        const response = await fetch("/api/sidebar-art", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ rows: currentRowsFromPixels() }),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Unable to save right panel art");
        }

        state.sidebarArt = payload.art;
        state.savedRows = payload.art.rows.slice();
        state.pixels = sidebarRowsToPixels(payload.art.rows, payload.art);
        state.dirty = false;
        setStatus(payload.build && payload.build.ok ? "Saved and rebuilt" : "Saved, build failed", payload.build && payload.build.ok ? "ok" : "error");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        state.saving = false;
        render();
      }
    }

    function saveCurrent() {
      if (state.mode === MODE_SIDEBAR_ART) {
        saveSidebarArt();
        return;
      }
      saveSprite();
    }

    spriteList.addEventListener("click", (event) => {
      const item = event.target.closest(".sprite-item");
      if (!item) {
        return;
      }

      if (state.mode === MODE_SIDEBAR_ART) {
        selectSidebarArt();
      } else {
        selectSprite(item.dataset.id);
      }
    });

    spritesTab.addEventListener("click", () => {
      switchMode(MODE_SPRITES);
    });

    sidebarArtTab.addEventListener("click", () => {
      switchMode(MODE_SIDEBAR_ART);
    });

    drawToolButton.addEventListener("click", () => {
      state.tool = "draw";
      updateToolButtons();
    });

    eraseToolButton.addEventListener("click", () => {
      state.tool = "erase";
      updateToolButtons();
    });

    pixelGrid.addEventListener("contextmenu", (event) => {
      event.preventDefault();
    });

    pixelGrid.addEventListener("pointerdown", (event) => {
      if (!hasEditableSelection() || state.saving) {
        return;
      }

      const index = pixelIndexFromPointer(event);
      if (index === null) {
        return;
      }

      event.preventDefault();
      pixelGrid.setPointerCapture(event.pointerId);
      state.painting = true;
      state.paintValue = !(event.button === 2 || event.altKey || state.tool === "erase");
      setPixel(index, state.paintValue);
    });

    pixelGrid.addEventListener("pointermove", (event) => {
      if (!state.painting || !hasEditableSelection() || state.saving) {
        return;
      }
      event.preventDefault();
      paintFromPointer(event);
    });

    pixelGrid.addEventListener("pointerup", (event) => {
      if (state.painting) {
        state.painting = false;
        if (pixelGrid.hasPointerCapture(event.pointerId)) {
          pixelGrid.releasePointerCapture(event.pointerId);
        }
      }
    });

    pixelGrid.addEventListener("pointercancel", (event) => {
      state.painting = false;
      if (pixelGrid.hasPointerCapture(event.pointerId)) {
        pixelGrid.releasePointerCapture(event.pointerId);
      }
    });

    pixelGrid.addEventListener("click", (event) => {
      if (event.detail !== 0 || !hasEditableSelection() || state.saving) {
        return;
      }

      const pixel = event.target.closest(".pixel");
      if (!pixel) {
        return;
      }
      setPixel(Number(pixel.dataset.index), state.tool === "draw");
    });

    undoButton.addEventListener("click", () => {
      if (!hasEditableSelection()) {
        return;
      }
      state.pixels = currentPixelsFromRows(state.savedRows);
      state.dirty = false;
      render();
      setStatus("Ready", "ok");
    });

    saveButton.addEventListener("click", saveCurrent);

    loadEditorData().catch((error) => {
      setStatus(error.message, "error");
      render();
    });
  </script>
</body>
</html>
